<html>
    <head>
        <title>3d map 45-degree perspective</title>
        <link rel="stylesheet" type="text/css" href="./style.css" />
        <script type="module" src="./index.js"></script>
        <script
            async
            src="https://maps.googleapis.com/maps/api/js?loading=async&key=GOOGLE_MAPS_API_KEY&libraries=maps3d"></script>
    </head>
    <body>
        <gmp-map-3d
            id="gmp-map-3d"
            center="37.789,-122.401,0"
            range="2200"
            tilt="45"
            heading="188"
            min-tilt="0"
            max-tilt="45"
            mode="satellite">
        </gmp-map-3d>
    </body>
</html>
