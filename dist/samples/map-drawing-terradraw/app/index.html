<html>
    <head>
        <title>Terra Draw with Google Maps API Sample</title>
        <link rel="stylesheet" href="./style.css" />
        <!-- Terra Draw CSS (if any needed, add here) -->
    </head>
    <body>
        <!-- Map Container -->
        <div id="map"></div>

        <!-- Top-right mode selection UI -->
        <div id="mode-ui">
            <button id="point-mode" class="mode-button" title="Point">
                <img src="./img/point.svg" alt="Point" draggable="false" />
            </button>
            <button id="linestring-mode" class="mode-button" title="Linestring">
                <img
                    src="./img/polyline.svg"
                    alt="Linestring"
                    draggable="false" />
            </button>
            <button
                id="polygon-mode"
                class="mode-button active"
                title="Polygon">
                <img src="./img/polygon.png" alt="Polygon" draggable="false" />
            </button>
            <button id="rectangle-mode" class="mode-button" title="Rectangle">
                <img
                    src="./img/rectangle.svg"
                    alt="Rectangle"
                    draggable="false" />
            </button>
            <button id="circle-mode" class="mode-button" title="Circle">
                <img src="./img/circle.svg" alt="Circle" draggable="false" />
            </button>
            <button id="freehand-mode" class="mode-button" title="Freehand">
                <img
                    src="./img/freehand.svg"
                    alt="Freehand"
                    draggable="false" />
            </button>
            <button id="select-mode" class="mode-button" title="Select">
                <img src="./img/select.svg" alt="Select" draggable="false" />
            </button>
            <button id="resize-button" class="mode-button" title="Resize">
                <img src="./img/resize.svg" alt="Resize" draggable="false" />
            </button>
            <button id="clear-mode" class="mode-button" title="Clear">
                <img src="./img/delete.svg" alt="Clear" draggable="false" />
            </button>
            <button
                id="delete-selected-button"
                class="mode-button"
                title="Clear last or Selected">
                <img
                    src="./img/delete-selected.svg"
                    alt="Delete Selected"
                    draggable="false" />
            </button>
            <button id="undo-button" class="mode-button" title="Undo">
                <img src="./img/undo.svg" alt="Undo" draggable="false" />
            </button>
            <button id="redo-button" class="mode-button" title="Redo">
                <img src="./img/redo.svg" alt="Redo" draggable="false" />
            </button>
            <button id="export-button" class="mode-button" title="Export">
                <img src="./img/download.svg" alt="Export" draggable="false" />
            </button>
            <button id="upload-button" class="mode-button" title="Upload">
                <img src="./img/upload.svg" alt="Upload" draggable="false" />
            </button>
            <input
                type="file"
                id="upload-input"
                style="display: none"
                accept=".geojson,.json" />
        </div>

        <script type="module" src="./index.ts"></script>
        <!-- prettier-ignore -->

    </body>
</html>
